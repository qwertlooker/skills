name: Release Skills Package

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'skills/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine skills directory
        id: skills-dir
        run: |
          if [ -d "skills" ]; then
            echo "dir=skills" >> $GITHUB_OUTPUT
            echo "Skills directory found: skills"
          else
            echo "Error: No skills directory found"
            exit 1
          fi

      - name: Get version info
        id: version
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          echo "version=${DATE}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "tag=skills-release-${DATE}-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          SKILLS_DIR="${{ steps.skills-dir.outputs.dir }}"
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="skills-release-${VERSION}.zip"
          zip -r "${ZIP_NAME}" "${SKILLS_DIR}" -x "*.git*" -x "*node_modules*"
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "zip_path=${GITHUB_WORKSPACE}/${ZIP_NAME}" >> $GITHUB_OUTPUT
        id: zip
        working-directory: ${{ github.workspace }}

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Skills Release ${{ steps.version.outputs.version }}
          files: ${{ steps.zip.outputs.zip_path }}
          body: |
            Skills package released on ${{ steps.version.outputs.version }}
            - Source commit: ${{ github.sha }}
            - Triggered by: ${{ github.actor }}
          generate_release_notes: true
